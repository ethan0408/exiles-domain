        function initializePlayers(numPlayers) {
            const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b'];
            const names = ['Player 1', 'Player 2', 'Player 3', 'Player 4'];
            const startGold = parseInt(document.getElementById('start-gold').value, 10) || 200000;
            const startPop = parseInt(document.getElementById('start-pop').value, 10) || 5000;
            const gameMode = document.getElementById('game-mode').value;

            gameState.players = [];
            for (let i = 0; i < numPlayers; i++) {
                gameState.players.push({
                    id: i, name: names[i], color: colors[i], gold: startGold, troops: 200,
                    population: startPop, happiness: 100, isAI: gameMode === 'pvai' && i > 0, isDefeated: false
                });
            }

            gameState.diplomacy = {};
            for (let i = 0; i < numPlayers; i++) {
                for (let j = i + 1; j < numPlayers; j++) gameState.diplomacy[`${i}_${j}`] = 'war';
            }
        }

        function initializeGame() {
            const numPlayers = parseInt(document.getElementById('player-count').value, 10);
            const boardSizeSelect = document.getElementById('board-size').value;
            const startCapitalOnly = document.getElementById('capital-toggle').classList.contains('active');

            const boardSelect = boardSizeSelect;
            if (boardSelect === 'small') { gameState.boardRows = 12; gameState.boardCols = 15; }
            else if (boardSelect === 'large') { gameState.boardRows = 18; gameState.boardCols = 22; }
            else { gameState.boardRows = 15; gameState.boardCols = 18; }

            gameState.numPlayers = numPlayers;
            const rows = gameState.boardRows;
            const cols = gameState.boardCols;
            const totalCells = rows * cols;

            initializePlayers(numPlayers);
            gameState.terrain = generateTerrain();
            generateNamedFeatures(gameState.terrain);

            gameState.ownership = new Array(totalCells).fill(-1);
            gameState.buildings = new Array(totalCells).fill(null);
            gameState.troops = new Array(totalCells).fill(0);
            gameState.disasters = new Array(totalCells).fill(null);
            gameState.claimsThisTurn = 0;
            gameState.attacksThisTurn = 0;
            gameState.selectedRow = null;
            gameState.selectedCol = null;
            gameState.capitalTiles = new Set();
            gameState.boardRotationX = 60;
            gameState.boardRotationZ = -45;

            if (!startCapitalOnly) {
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const idx = r * cols + c;
                        if (numPlayers === 2) {
                            if (c < Math.floor(cols / 2)) { gameState.ownership[idx] = 0; }
                            else { gameState.ownership[idx] = 1; }
                        } else if (numPlayers === 3) {
                            if (c < Math.floor(cols / 3)) { gameState.ownership[idx] = 0; }
                            else if (c < Math.floor(2 * cols / 3)) { gameState.ownership[idx] = 1; }
                            else { gameState.ownership[idx] = 2; }
                        } else {
                            if (r < Math.floor(rows / 2) && c < Math.floor(cols / 2)) { gameState.ownership[idx] = 0; }
                            else if (r < Math.floor(rows / 2) && c >= Math.floor(cols / 2)) { gameState.ownership[idx] = 1; }
                            else if (r >= Math.floor(rows / 2) && c < Math.floor(cols / 2)) { gameState.ownership[idx] = 2; }
                            else { gameState.ownership[idx] = 3; }
                        }
                    }
                }
            }

            const capitals = getCapitalPositions(numPlayers);
            capitals.forEach((pos, playerIdx) => {
                const [r, c] = pos;
                const idx = r * cols + c;
                gameState.ownership[idx] = playerIdx;
                gameState.buildings[idx] = 'city';
                gameState.troops[idx] = 200;
                gameState.capitalTiles.add(idx);
            });

            if (!startCapitalOnly) {
                const buildingTypes = ['fort', 'town', 'mine'];
                for (let i = 0; i < totalCells; i++) {
                    if (gameState.ownership[i] >= 0 && !gameState.buildings[i]) {
                        if (Math.random() < 0.06) gameState.buildings[i] = buildingTypes[Math.floor(Math.random() * buildingTypes.length)];
                    }
                }
            }
        }

        function generateTerrain() {
            const rows = gameState.boardRows;
            const cols = gameState.boardCols;
            const matrix = Array(rows).fill(null).map(() => Array(cols).fill('ocean'));

            const centerX = Math.floor(cols / 2);
            const centerY = Math.floor(rows / 2);
            const maxRadius = Math.min(rows, cols) * 0.45;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const dx = c - centerX;
                    const dy = r - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    matrix[r][c] = dist < maxRadius * (0.8 + Math.random() * 0.4) ? 'plains' : 'ocean';
                }
            }

            const mountainRangeRowStart = Math.floor(rows * 0.3);
            const mountainRangeRowEnd = Math.floor(rows * 0.7);
            const mountainCol = Math.floor(cols / 2);

            for (let r = mountainRangeRowStart; r <= mountainRangeRowEnd; r++) {
                for (let c = mountainCol - 1; c <= mountainCol + 1; c++) {
                    if (r >= 0 && r < rows && c >= 0 && c < cols) {
                        matrix[r][c] = 'mountain';
                        if (Math.random() < 0.4) {
                            if (c > 0) matrix[r][c - 1] = 'hills';
                            if (c < cols - 1) matrix[r][c + 1] = 'hills';
                        }
                    }
                }
            }

            for (let r = 0; r < Math.floor(rows * 0.2); r++) {
                for (let c = 0; c < cols; c++) if (matrix[r][c] !== 'ocean') matrix[r][c] = 'tundra';
            }

            for (let r = Math.floor(rows * 0.8); r < rows; r++) {
                for (let c = 0; c < cols; c++) if (matrix[r][c] !== 'ocean') matrix[r][c] = 'tundra';
            }

            const desertStartCol = Math.floor(cols * 0.6);
            for (let r = Math.floor(rows * 0.3); r < Math.floor(rows * 0.7); r++) {
                for (let c = desertStartCol; c < cols; c++) {
                    if (matrix[r][c] !== 'ocean' && matrix[r][c] !== 'mountain') {
                        matrix[r][c] = Math.random() < 0.15 ? 'oasis' : 'desert';
                    }
                }
            }

            for (let i = 0; i < 2; i++) {
                const lakeR = Math.floor(Math.random() * (rows - 4)) + 2;
                const lakeC = Math.floor(Math.random() * (cols - 4)) + 2;
                matrix[lakeR][lakeC] = 'ocean';
                matrix[lakeR + 1][lakeC] = 'ocean';
                matrix[lakeR][lakeC + 1] = 'ocean';
            }

            return matrix;
        }

        function generateNamedFeatures(terrain) {
            gameState.namedFeatures = [];
            for (let i = 0; i < 6; i++) {
                const r = Math.floor(Math.random() * gameState.boardRows);
                const c = Math.floor(Math.random() * gameState.boardCols);
                const t = terrain[r][c];
                if (!Object.keys(TERRAIN_NAMES).includes(t)) continue;

                const names = TERRAIN_NAMES[t];
                const suffixes = TERRAIN_SUFFIXES[t];
                const name = `${names[Math.floor(Math.random() * names.length)]} ${suffixes[Math.floor(Math.random() * suffixes.length)]}`;

                if (!gameState.namedFeatures.some(f => f.row === r && f.col === c)) gameState.namedFeatures.push({ row: r, col: c, name });
            }
        }

        function getCapitalPositions(numPlayers) {
            const rows = gameState.boardRows;
            const cols = gameState.boardCols;
            if (numPlayers === 2) return [[Math.floor(rows / 2), Math.floor(cols / 3)], [Math.floor(rows / 2), Math.floor(2 * cols / 3)]];
            if (numPlayers === 3) return [[Math.floor(rows / 3), Math.floor(cols / 3)], [Math.floor(2 * rows / 3), Math.floor(cols / 2)], [Math.floor(rows / 2), Math.floor(2 * cols / 3)]];
            return [[Math.floor(rows / 4), Math.floor(cols / 4)], [Math.floor(rows / 4), Math.floor(3 * cols / 4)], [Math.floor(3 * rows / 4), Math.floor(cols / 4)], [Math.floor(3 * rows / 4), Math.floor(3 * cols / 4)]];
        }

        function getWarCount(playerIdx) {
            let count = 0;
            for (const key in gameState.diplomacy) {
                if ((key.startsWith(`${playerIdx}_`) || key.endsWith(`_${playerIdx}`)) && gameState.diplomacy[key] === 'war') count++;
            }
            return count;
        }

        function isAdjacentToOwned(r, c, playerIdx) {
            const neighbors = [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]];
            for (const [nr, nc] of neighbors) {
                if (nr >= 0 && nr < gameState.boardRows && nc >= 0 && nc < gameState.boardCols) {
                    const idx = nr * gameState.boardCols + nc;
                    if (gameState.ownership[idx] === playerIdx) return true;
                }
            }
            return false;
        }

        function getBuildingChar(building) {
            switch (building) {
                case 'city': return 'C';
                case 'town': return 'T';
                case 'fort': return 'F';
                case 'mine': return 'M';
                case 'silo': return 'S';
                case 'mds': return 'D';
                case 'vaccine': return 'V';
                default: return '';
            }
        }

        function animateMissile(sourceIdx, targetIdx, intercepted) {
            return new Promise(resolve => {
                sfx.launch();
                const layer = document.getElementById('missile-layer');
                if (!layer) { resolve(); return; }

                const sR = Math.floor(sourceIdx / gameState.boardCols);
                const sC = sourceIdx % gameState.boardCols;
                const tR = Math.floor(targetIdx / gameState.boardCols);
                const tC = targetIdx % gameState.boardCols;
                const sCell = document.querySelector(`.cell[data-row="${sR}"][data-col="${sC}"]`);
                const tCell = document.querySelector(`.cell[data-row="${tR}"][data-col="${tC}"]`);
                if (!sCell || !tCell) { resolve(); return; }

                const layerRect = layer.getBoundingClientRect();
                const sRect = sCell.getBoundingClientRect();
                const tRect = tCell.getBoundingClientRect();

                const sx = sRect.left - layerRect.left + sRect.width / 2;
                const sy = sRect.top  - layerRect.top  + sRect.height / 2;
                const tx = tRect.left - layerRect.left + tRect.width / 2;
                const ty = tRect.top  - layerRect.top  + tRect.height / 2;

                const stopFrac = intercepted ? 0.55 : 1.0;
                const ex = sx + (tx - sx) * stopFrac;
                const ey = sy + (ty - sy) * stopFrac;

                const distance = Math.hypot(tx - sx, ty - sy);
                const duration = Math.min(1400, 600 + distance * 1.4);

                const missile = document.createElement('div');
                missile.className = 'missile';
                missile.textContent = '🚀';
                missile.style.left = '0px';
                missile.style.top = '0px';
                missile.style.transform = `translate(${sx}px, ${sy}px) rotate(0deg)`;
                layer.appendChild(missile);

                const start = performance.now();
                const arcHeight = Math.max(80, distance * 0.35);

                let lastTrailAt = 0;

                function frame(now) {
                    const tRaw = (now - start) / duration;
                    const t = Math.min(1, tRaw) * stopFrac;
                    const x = sx + (ex - sx) * (t / stopFrac);
                    const y = sy + (ey - sy) * (t / stopFrac) - Math.sin((t / stopFrac) * Math.PI) * arcHeight;
                    const dxN = (ex - sx);
                    const dyN = (ey - sy) - Math.cos((t / stopFrac) * Math.PI) * Math.PI * arcHeight;
                    const angle = Math.atan2(dyN, dxN) * 180 / Math.PI + 90;
                    missile.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%) rotate(${angle}deg)`;

                    if (now - lastTrailAt > 35) {
                        lastTrailAt = now;
                        const trail = document.createElement('div');
                        trail.className = 'missile-trail';
                        trail.style.left = `${x - 5}px`;
                        trail.style.top  = `${y - 5}px`;
                        layer.appendChild(trail);
                        setTimeout(() => trail.remove(), 600);
                    }

                    if (tRaw < stopFrac) {
                        requestAnimationFrame(frame);
                    } else {
                        sfx.explode();
                        missile.remove();
                        const burst = document.createElement('div');
                        burst.className = intercepted ? 'missile-intercept' : 'missile-explosion';
                        burst.style.left = `${ex}px`;
                        burst.style.top  = `${ey}px`;
                        layer.appendChild(burst);
                        setTimeout(() => { burst.remove(); resolve(); }, 900);
                    }
                }
                requestAnimationFrame(frame);
            });
        }

        function getBuildingGlyph(building) {
            switch (building) {
                case 'city': return '🏙️';
                case 'town': return '🏘️';
                case 'fort': return '🏰';
                case 'mine': return '⛏️';
                case 'silo': return '🚀';
                case 'mds':  return '🛡️';
                case 'vaccine': return '💉';
                default: return '';
            }
        }

        function getDisasterChar(type) {
            switch (type) {
                case 'mud': return '🟫';
                case 'flood': return '🌊';
                case 'crack': return '⚡';
                case 'magma': return '🌋';
                case 'snow': return '❄️';
                case 'plague': return '🦠';
                case 'radiation': return '☢️';
                default: return '';
            }
        }

        function aiAttack(targetIdx, defenderIdx, attackerIdx) {
            if (defenderIdx === -1 || defenderIdx === attackerIdx) return false;
            if (gameState.attacksThisTurn >= 3) return false;

            const key = attackerIdx < defenderIdx ? `${attackerIdx}_${defenderIdx}` : `${defenderIdx}_${attackerIdx}`;
            const status = gameState.diplomacy[key] || 'war';
            if (status !== 'war') return false;

            const tr = Math.floor(targetIdx / gameState.boardCols);
            const tc = targetIdx % gameState.boardCols;

            const adjacentOwned = getAdjacentOwnedTiles(tr, tc, attackerIdx).filter(i => gameState.troops[i] > 20);
            if (adjacentOwned.length === 0) return false;

            let sourceIdx = adjacentOwned[0];
            for (const i of adjacentOwned) if (gameState.troops[i] > gameState.troops[sourceIdx]) sourceIdx = i;

            const attackerTroops = gameState.troops[sourceIdx];
            const defenderTroops = gameState.troops[targetIdx];

            const damage = Math.floor(attackerTroops * 0.35);
            gameState.troops[targetIdx] = Math.max(0, defenderTroops - damage);
            gameState.troops[sourceIdx] = Math.max(0, attackerTroops - Math.floor(damage * 0.45));

            if (gameState.troops[targetIdx] <= 0) {
                gameState.ownership[targetIdx] = attackerIdx;
                gameState.troops[targetIdx] = Math.max(20, Math.floor(attackerTroops * 0.2));
                logEvent(`Player ${attackerIdx + 1} (AI) conquered territory ${targetIdx}.`);
            } else {
                logEvent(`Player ${attackerIdx + 1} (AI) attacked territory ${targetIdx}.`);
            }

            sfx.attack();
            gameState.attacksThisTurn++;
            return true;
        }

        function aiBuildStructure(idx, playerIdx, type) {
            const p = gameState.players[playerIdx];
            const cost = gameState.BUILDING_COSTS[type];
            if (p.gold >= cost) {
                p.gold -= cost;
                gameState.buildings[idx] = type;
                sfx.build();
            }
        }

        function processAIDiplomacy(playerIdx) {
            for (let j = 0; j < gameState.numPlayers; j++) {
                if (j === playerIdx) continue;
                const key = playerIdx < j ? `${playerIdx}_${j}` : `${j}_${playerIdx}`;
                const status = gameState.diplomacy[key] || 'war';

                if (status === 'war') {
                    if (gameState.players[playerIdx].troops < 80 && Math.random() < 0.4) {
                        gameState.diplomacy[key] = 'peace';
                        logEvent(`🤝 Player ${playerIdx + 1} (AI) seeks peace with Player ${j + 1}.`);
                    }
                } else if (status === 'peace') {
                    const p = gameState.players[playerIdx];
                    const otherP = gameState.players[j];

                    if (p.troops > otherP.troops * 1.3 && Math.random() < 0.5) {
                        gameState.diplomacy[key] = 'war';
                        logEvent(`⚔️ Player ${playerIdx + 1} (AI) broke peace and declared War on Player ${j + 1}!`);
                    } else if (p.gold > 300000 && Math.random() < 0.2) {
                        gameState.diplomacy[key] = 'ally';
                        logEvent(`🤝 Player ${playerIdx + 1} (AI) proposes an Alliance with Player ${j + 1}.`);
                    }
                } else if (status === 'ally') {
                    if (Math.random() < 0.1) {
                        gameState.diplomacy[key] = 'war';
                        logEvent(`⚔️ Player ${playerIdx + 1} (AI) betrayed the alliance and declared War on Player ${j + 1}!`);
                    }
                }
            }
        }

        function handleCellClick(r, c) {
            sfx.click();
            const idx = r * gameState.boardCols + c;
            const playerIdx = gameState.currentPlayer;
            const owner = gameState.ownership[idx];

            if (gameState.selectedAction === 'attack') {
                if (gameState.attackSourceIdx === null) {
                    if (owner !== playerIdx) {
                        sfx.error();
                        alert("Pick one of YOUR tiles first (with more than 20 troops).");
                        return;
                    }
                    if (gameState.troops[idx] <= 20) {
                        sfx.error();
                        alert("That tile doesn't have enough troops to attack (need > 20).");
                        return;
                    }
                    gameState.attackSourceIdx = idx;
                    gameState.selectedRow = r;
                    gameState.selectedCol = c;
                    logEvent(`🎯 Source set to (${r}, ${c}). Now click an adjacent enemy tile.`);
                    renderGame();
                    return;
                }

                const sR = Math.floor(gameState.attackSourceIdx / gameState.boardCols);
                const sC = gameState.attackSourceIdx % gameState.boardCols;
                const isAdjacent = (Math.abs(sR - r) + Math.abs(sC - c)) === 1;

                if (owner === playerIdx) {
                    if (gameState.troops[idx] <= 20) {
                        sfx.error();
                        alert("That tile doesn't have enough troops to attack (need > 20).");
                        return;
                    }
                    gameState.attackSourceIdx = idx;
                    gameState.selectedRow = r;
                    gameState.selectedCol = c;
                    logEvent(`🎯 Source changed to (${r}, ${c}).`);
                    renderGame();
                    return;
                }

                if (!isAdjacent) {
                    sfx.error();
                    alert("Target must be ADJACENT (up/down/left/right) to your source tile.");
                    return;
                }
                if (owner === -1) {
                    sfx.error();
                    alert("That tile is unclaimed — use Claim instead.");
                    return;
                }
                handleAttack(idx, owner, playerIdx, gameState.attackSourceIdx);
                gameState.attackSourceIdx = null;
                renderGame();
                return;
            }

            logEvent(`Selected tile: (${r}, ${c})`);
            gameState.selectedRow = r;
            gameState.selectedCol = c;
            renderGame();
        }

        function handleClaim(idx, newOwner) {
            if (gameState.claimsThisTurn >= gameState.maxClaimsPerTurn) {
                sfx.error(); alert("Cannot make more claims this turn!"); return;
            }

            const r = Math.floor(idx / gameState.boardCols);
            const c = idx % gameState.boardCols;
            let sourceIdx = -1;
            const neighbors = [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]];

            for (const [nr, nc] of neighbors) {
                if (nr >= 0 && nr < gameState.boardRows && nc >= 0 && nc < gameState.boardCols) {
                    const checkIdx = nr * gameState.boardCols + nc;
                    if (gameState.ownership[checkIdx] === newOwner && gameState.troops[checkIdx] >= gameState.TROOP_CLAIM) {
                        sourceIdx = checkIdx;
                        break;
                    }
                }
            }

            if (sourceIdx === -1) {
                sfx.error(); alert("You need an adjacent territory with at least 100 troops to claim this territory!"); return;
            }
            if (gameState.ownership[idx] !== -1) {
                sfx.error(); alert("Can only claim an unclaimed territory!"); return;
            }

            gameState.ownership[idx] = newOwner;
            gameState.troops[sourceIdx] -= gameState.TROOP_CLAIM;
            gameState.troops[idx] = Math.floor(gameState.TROOP_CLAIM / 2);
            gameState.claimsThisTurn++;
            sfx.claim();
            logEvent(`Player ${newOwner + 1} claimed territory ${idx}.`);
            renderGame();
        }

        function aiClaim(targetIdx, playerIdx) {
            if (gameState.claimsThisTurn >= gameState.maxClaimsPerTurn) return false;
            const r = Math.floor(targetIdx / gameState.boardCols);
            const c = targetIdx % gameState.boardCols;
            let sourceIdx = -1;
            const neighbors = [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]];

            for (const [nr, nc] of neighbors) {
                if (nr >= 0 && nr < gameState.boardRows && nc >= 0 && nc < gameState.boardCols) {
                    const checkIdx = nr * gameState.boardCols + nc;
                    if (gameState.ownership[checkIdx] === playerIdx && gameState.troops[checkIdx] >= gameState.TROOP_CLAIM) { sourceIdx = checkIdx; break; }
                }
            }

            if (sourceIdx !== -1) {
                gameState.ownership[targetIdx] = playerIdx;
                gameState.troops[sourceIdx] -= gameState.TROOP_CLAIM;
                gameState.troops[targetIdx] = Math.floor(gameState.TROOP_CLAIM / 2);
                gameState.claimsThisTurn++;
                sfx.claim();
                logEvent(`Player ${playerIdx + 1} (AI) claimed territory ${targetIdx}.`);
                return true;
            }
            return false;
        }

        function buyTroopsDirectly() {
            sfx.click();
            const p = gameState.players[gameState.currentPlayer];
            if (p.gold >= gameState.TROOP_COST) {
                p.gold -= gameState.TROOP_COST;
                p.troops += 100;
                sfx.build();
                logEvent(`${p.name} bought 100 troops.`);
                renderGame();
            } else {
                sfx.error();
                alert("Not enough gold to buy troops!");
            }
        }

        function handleAttack(targetIdx, defenderIdx, attackerIdx, sourceIdx) {
            const pAttacker = gameState.players[attackerIdx];
            if (gameState.attacksThisTurn >= 3) { sfx.error(); alert("Cannot make more than 3 attacks per turn!"); return; }

            const key = attackerIdx < defenderIdx ? `${attackerIdx}_${defenderIdx}` : `${defenderIdx}_${attackerIdx}`;
            const status = gameState.diplomacy[key] || 'war';
            if (status === 'ally' || status === 'peace') {
                sfx.error();
                alert(`Cannot attack Player ${defenderIdx + 1}! You have an active ${status} agreement.`);
                return;
            }

            if (gameState.troops[sourceIdx] <= 20) { sfx.error(); alert("Not enough troops on this tile to attack!"); return; }

            const attackerTroops = gameState.troops[sourceIdx];
            const defenderTroops = gameState.troops[targetIdx];

            const damage = Math.floor(attackerTroops * 0.4);
            gameState.troops[targetIdx] = Math.max(0, defenderTroops - damage);
            gameState.troops[sourceIdx] = Math.max(0, attackerTroops - Math.floor(damage * 0.4));

            if (gameState.troops[targetIdx] <= 0) {
                gameState.ownership[targetIdx] = attackerIdx;
                gameState.troops[targetIdx] = Math.floor(attackerTroops * 0.2);
                logEvent(`${pAttacker.name} conquered territory ${targetIdx}!`);
            } else {
                logEvent(`${pAttacker.name} attacked territory ${targetIdx}. Defender troops remaining: ${gameState.troops[targetIdx]}`);
            }

            sfx.attack();
            gameState.attacksThisTurn++;
            renderGame();
        }

        function handleBuildStructure(idx, ownerIdx, playerIdx, type, r, c) {
            if (ownerIdx !== playerIdx) { sfx.error(); alert("You can only build structures on your own territory!"); return; }

            const p = gameState.players[playerIdx];
            const cost = gameState.BUILDING_COSTS[type];
            if (p.gold >= cost) {
                p.gold -= cost;
                gameState.buildings[idx] = type;
                sfx.build();
                logEvent(`${p.name} built a ${type} at (${r}, ${c}).`);
                renderGame();
            } else {
                sfx.error();
                alert(`Not enough gold to build a ${type}`);
            }
        }

        function triggerDisaster() {
            logEvent('⚠️ Disaster triggered across the board.');
            sfx.disaster();
            const rows = gameState.boardRows;
            const cols = gameState.boardCols;
            const disasterTypes = ['mud', 'flood', 'crack', 'magma', 'snow', 'radiation'];
            const randomType = disasterTypes[Math.floor(Math.random() * disasterTypes.length)];

            let attempts = 0;
            let placed = false;

            while (!placed && attempts < 50) {
                attempts++;
                const startR = Math.floor(Math.random() * (rows - 1));
                const startC = Math.floor(Math.random() * (cols - 1));

                let hasCapital = false;
                for (let r = startR; r <= startR + 1; r++) {
                    for (let c = startC; c <= startC + 1; c++) {
                        const idx = r * cols + c;
                        if (isCapitalTile(idx)) { hasCapital = true; break; }
                    }
                    if (hasCapital) break;
                }

                if (!hasCapital) {
                    for (let r = startR; r <= startR + 1; r++) {
                        for (let c = startC; c <= startC + 1; c++) {
                            const idx = r * cols + c;
                            gameState.disasters[idx] = { type: randomType, turns: 3 };
                        }
                    }
                    logEvent(`⚠️ A 2x2 ${randomType} disaster struck starting at (${startR}, ${startC})!`);
                    placed = true;
                }
            }

            renderBoard();
        }

        function applyDisasterEffects() {
            for (let i = 0; i < gameState.ownership.length; i++) {
                if (!gameState.disasters[i]) continue;

                const disaster = gameState.disasters[i];
                const owner = gameState.ownership[i];

                if (owner >= 0) {
                    const p = gameState.players[owner];

                    if (disaster.type === 'mud' || disaster.type === 'flood') {
                        gameState.troops[i] = Math.max(0, gameState.troops[i] - 50);
                        logEvent(`⚠️ Disaster at tile ${i} damages army! (-50 troops)`);
                    } else if (disaster.type === 'magma' || disaster.type === 'radiation') {
                        if (gameState.buildings[i]) {
                            if (isCapitalTile(i)) logEvent(`🛡️ Disaster at tile ${i} threatened the capital, but it held firm!`);
                            else { gameState.buildings[i] = null; logEvent(`⚠️ Disaster at tile ${i} destroyed the structure!`); }
                        }
                    } else if (disaster.type === 'snow' || disaster.type === 'crack') {
                        p.happiness = Math.max(0, p.happiness - 10);
                        logEvent(`⚠️ Disaster at tile ${i} affects citizens! (-10% Happiness)`);
                    }
                }

                disaster.turns--;
                if (disaster.turns <= 0) {
                    if (isCapitalTile(i)) {
                        logEvent(`The crisis passes at tile ${i}. The capital holds firm!`);
                    } else {
                        gameState.ownership[i] = -1;
                        gameState.buildings[i] = null;
                        gameState.troops[i] = 0;
                        gameState.disasters[i] = null;
                        logEvent(`⚠️ The crisis passes at tile ${i}. The territory is restored to the wasteland.`);
                    }
                    gameState.disasters[i] = null;
                }
            }
        }

        function executeAction() {
            sfx.click();
            if (gameState.selectedRow === null || gameState.selectedCol === null) {
                sfx.error();
                alert("Please select a territory on the board first.");
                return;
            }

            const r = gameState.selectedRow;
            const c = gameState.selectedCol;
            const idx = r * gameState.boardCols + c;
            const playerIdx = gameState.currentPlayer;

            switch (gameState.selectedAction) {
                case 'claim':
                    handleClaim(idx, playerIdx);
                    break;
                case 'attack': {
                    if (gameState.attackSourceIdx === null) {
                        if (gameState.ownership[idx] !== playerIdx) {
                            sfx.error();
                            alert("Click YOUR tile first to set it as the attack source, then click an adjacent enemy tile.");
                            break;
                        }
                        if (gameState.troops[idx] <= 20) {
                            sfx.error();
                            alert("This tile doesn't have enough troops to attack (need > 20).");
                            break;
                        }
                        gameState.attackSourceIdx = idx;
                        logEvent(`🎯 Source set to (${r}, ${c}). Now click an adjacent enemy tile.`);
                        renderGame();
                        break;
                    }
                    const sR = Math.floor(gameState.attackSourceIdx / gameState.boardCols);
                    const sC = gameState.attackSourceIdx % gameState.boardCols;
                    const neighbors = [[sR - 1, sC], [sR + 1, sC], [sR, sC - 1], [sR, sC + 1]];
                    let attacked = false;
                    for (const [nr, nc] of neighbors) {
                        if (nr >= 0 && nr < gameState.boardRows && nc >= 0 && nc < gameState.boardCols) {
                            const targetIdx = nr * gameState.boardCols + nc;
                            const towner = gameState.ownership[targetIdx];
                            if (towner !== -1 && towner !== playerIdx) {
                                handleAttack(targetIdx, towner, playerIdx, gameState.attackSourceIdx);
                                attacked = true;
                                break;
                            }
                        }
                    }
                    gameState.attackSourceIdx = null;
                    if (!attacked) {
                        sfx.error();
                        alert("No adjacent enemy territory next to your selected source!");
                    }
                    break;
                }
                case 'fort':
                case 'town':
                case 'city':
                case 'mine':
                case 'silo':
                case 'mds':
                    handleBuildStructure(idx, gameState.ownership[idx], playerIdx, gameState.selectedAction, r, c);
                    break;
                case 'withdraw':
                    if (gameState.ownership[idx] === playerIdx) {
                        if (gameState.troops[idx] > 50) {
                            gameState.troops[idx] -= 50;
                            gameState.players[playerIdx].troops += 50;
                            logEvent(`Withdrew 50 troops from (${r}, ${c}).`);
                            renderGame();
                        } else {
                            sfx.error();
                            alert("Not enough troops to withdraw!");
                        }
                    } else {
                        sfx.error();
                        alert("You don't own this territory!");
                    }
                    break;
                case 'deploy':
                    if (gameState.ownership[idx] === playerIdx) {
                        if (gameState.players[playerIdx].troops >= 50) {
                            gameState.players[playerIdx].troops -= 50;
                            gameState.troops[idx] += 50;
                            logEvent(`Deployed 50 troops to (${r}, ${c}).`);
                            renderGame();
                        } else {
                            sfx.error();
                            alert("Not enough troops in reserve!");
                        }
                    } else {
                        sfx.error();
                        alert("You don't own this territory!");
                    }
                    break;
                case 'launch':
                    if (gameState.buildings[idx] === 'silo') {
                        const targets = [];
                        for (let i = 0; i < gameState.ownership.length; i++) {
                            if (gameState.ownership[i] !== -1 && gameState.ownership[i] !== playerIdx) targets.push(i);
                        }
                        if (targets.length === 0) { sfx.error(); alert("No enemy targets to launch a missile at!"); break; }

                        const targetIdx = targets[Math.floor(Math.random() * targets.length)];
                        const p = gameState.players[playerIdx];

                        if (p.gold < 250000) { sfx.error(); alert("Not enough gold to launch a missile ($250,000 required)!"); break; }

                        p.gold -= 250000;
                        const targetR = Math.floor(targetIdx / gameState.boardCols);
                        const targetC = targetIdx % gameState.boardCols;
                        let intercepted = false;

                        for (let rr = targetR - 1; rr <= targetR + 1; rr++) {
                            for (let cc = targetC - 1; cc <= targetC + 1; cc++) {
                                if (rr >= 0 && rr < gameState.boardRows && cc >= 0 && cc < gameState.boardCols) {
                                    const checkIdx = rr * gameState.boardCols + cc;
                                    if (gameState.buildings[checkIdx] === 'mds') { intercepted = true; break; }
                                }
                            }
                            if (intercepted) break;
                        }

                        animateMissile(idx, targetIdx, intercepted).then(() => {
                            if (intercepted) {
                                logEvent(`🚀 Missile launched by Player ${playerIdx + 1} at tile ${targetIdx} but was intercepted by MDS!`);
                            } else {
                                gameState.troops[targetIdx] = Math.max(0, gameState.troops[targetIdx] - 150);
                                if (gameState.buildings[targetIdx] && !isCapitalTile(targetIdx)) {
                                    gameState.buildings[targetIdx] = null;
                                    logEvent(`🚀 Missile hit! Structure at tile ${targetIdx} destroyed.`);
                                } else {
                                    logEvent(`🚀 Missile hit! Tile ${targetIdx} took 150 damage.`);
                                }
                            }
                            renderGame();
                        });
                    } else {
                        sfx.error();
                        alert("Select a tile containing your Silo to launch!");
                    }
                    break;
                default:
                    sfx.error();
                    alert("Unsupported action selected or action not implemented yet!");
            }
        }

        function openDiplomacy() {
            sfx.click();
            const grid = document.getElementById('diplomacy-grid');
            grid.innerHTML = '';

            for (let i = 0; i < gameState.numPlayers; i++) {
                if (i === gameState.currentPlayer || gameState.players[i].isDefeated) continue;

                const row = document.createElement('div');
                row.className = 'diplomacy-row';

                const key = gameState.currentPlayer < i ? `${gameState.currentPlayer}_${i}` : `${i}_${gameState.currentPlayer}`;
                const currentStatus = gameState.diplomacy[key] || 'war';
                const t = localization[currentLang];

                row.innerHTML = `
                    <div><strong>Player ${i + 1}</strong> (${t.status}: ${currentStatus.toUpperCase()})</div>
                    <div><small style="color: var(--text-muted);">${t.diploCostText}</small></div>
                    <div class="diplomacy-buttons">
                        <button class="diplo-btn war" onclick="setDiplomacy(${gameState.currentPlayer}, ${i}, 'war')">${t.warBtn}</button>
                        <button class="diplo-btn peace" onclick="setDiplomacy(${gameState.currentPlayer}, ${i}, 'peace')">${t.peaceBtn}</button>
                        <button class="diplo-btn ally" onclick="setDiplomacy(${gameState.currentPlayer}, ${i}, 'ally')">${t.allyBtn}</button>
                    </div>
                `;
                grid.appendChild(row);
            }

            document.getElementById('diplomacy-modal').style.display = 'flex';
        }

        function closeDiplomacy() {
            sfx.click();
            document.getElementById('diplomacy-modal').style.display = 'none';
        }

        function setDiplomacy(p1, p2, status) {
            sfx.click();
            const key = p1 < p2 ? `${p1}_${p2}` : `${p2}_${p1}`;
            const currentStatus = gameState.diplomacy[key] || 'war';

            if (currentStatus === status) { sfx.error(); alert("Already in this diplomatic state!"); return; }

            const p = gameState.players[p1];
            let cost = 0;
            if (status === 'peace') cost = 50000;
            if (status === 'ally') cost = 200000;

            if (p.gold < cost) {
                sfx.error();
                alert(`Not enough gold to propose ${status}! ($${cost.toLocaleString()} required)`);
                return;
            }

            const otherPlayerIsAI = gameState.players[p2].isAI;

            if (otherPlayerIsAI) {
                let acceptanceChance = 0.5;
                if (status === 'war') acceptanceChance = 1.0;
                if (status === 'ally' && currentStatus !== 'peace') acceptanceChance = 0.2;
                if (status === 'ally' && currentStatus === 'peace') acceptanceChance = 0.6;

                if (Math.random() < acceptanceChance) {
                    p.gold -= cost;
                    gameState.diplomacy[key] = status;
                    logEvent(`🤝 Player ${p1 + 1} and Player ${p2 + 1} (AI) agreed to ${status}.`);
                    alert(`Player ${p2 + 1} (AI) accepted the proposal.`);
                } else {
                    p.gold -= Math.floor(cost * 0.2);
                    logEvent(`❌ Player ${p2 + 1} (AI) rejected the ${status} proposal.`);
                    alert(`Player ${p2 + 1} (AI) rejected the proposal.`);
                }
            } else {
                if (document.getElementById('game-mode').value === 'pass') {
                    if (!confirm(`Player ${p2 + 1}, do you accept the proposal for ${status} from Player ${p1 + 1}?`)) {
                        logEvent(`❌ Player ${p2 + 1} rejected the ${status} proposal.`);
                        return;
                    }
                }
                p.gold -= cost;
                gameState.diplomacy[key] = status;
                logEvent(`🤝 Diplomatic status between Player ${p1 + 1} and Player ${p2 + 1} changed to ${status}.`);
            }

            openDiplomacy();
            renderGame();
        }

        function endTurn() {
            if (isProcessingTurn) return;
            isProcessingTurn = true;
            sfx.click();

            const p = gameState.players[gameState.currentPlayer];
            applyDisasterEffects();
            processAIDiplomacy(gameState.currentPlayer);

            let minesCount = 0;
            let citiesCount = 0;
            let townsCount = 0;

            for (let i = 0; i < gameState.ownership.length; i++) {
                if (gameState.ownership[i] === gameState.currentPlayer) {
                    if (gameState.buildings[i] === 'mine') minesCount++;
                    else if (gameState.buildings[i] === 'city') citiesCount++;
                    else if (gameState.buildings[i] === 'town') townsCount++;
                }
            }

            p.happiness = Math.min(100, Math.max(10, 100 - (getWarCount(gameState.currentPlayer) * 10) - (minesCount * 4) + (citiesCount * 5) + (townsCount * 2)));

            if (Math.random() < 0.3) {
                const afflictedIndex = Math.floor(Math.random() * gameState.numPlayers);
                const afflictedPlayer = gameState.players[afflictedIndex];
                afflictedPlayer.population = Math.floor(afflictedPlayer.population * 0.85);
                logEvent(`🦠 An epidemic outbreak struck ${afflictedPlayer.name}! Population dropped.`);
            }

            const ownedTiles = gameState.ownership.filter(o => o === gameState.currentPlayer).length;
            const income = (ownedTiles * gameState.INCOME_PER_TILE) + (minesCount * 15000);
            p.gold += income;
            p.population += 120;

            if (p.population < 500 || p.happiness < customSettings.happinessThreshold) {
                sfx.error();
                alert(p.name + " collapsed due to population failure or revolt!");
                for (let i = 0; i < gameState.ownership.length; i++) {
                    if (gameState.ownership[i] === gameState.currentPlayer) {
                        gameState.ownership[i] = -1;
                        gameState.troops[i] = 0;
                        gameState.buildings[i] = null;
                        gameState.disasters[i] = null;
                        gameState.capitalTiles.delete(i);
                    }
                }
                p.isDefeated = true;
            }

            for (let i = 0; i < gameState.numPlayers; i++) {
                if (!gameState.players[i].isDefeated) {
                    let hasTiles = false;
                    for (let j = 0; j < gameState.ownership.length; j++) {
                        if (gameState.ownership[j] === i) { hasTiles = true; break; }
                    }
                    if (!hasTiles) {
                        gameState.players[i].isDefeated = true;
                        logEvent(`💀 Player ${i + 1} (${gameState.players[i].name}) was eliminated because they lost all their territory.`);
                    }
                }
            }

            const remainingPlayers = gameState.players.filter(pl => !pl.isDefeated);
            if (remainingPlayers.length === 1) {
                alert(`${remainingPlayers[0].name} has conquered the Exile's Domain! Game Over.`);
                returnToMenu();
                isProcessingTurn = false;
                renderGame();
                return;
            }

            gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.numPlayers;
            while (gameState.players[gameState.currentPlayer].isDefeated) {
                gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.numPlayers;
            }

            if (gameState.currentPlayer === 0) {
                gameState.turn++;
                gameState.disasterTimer--;
                if (gameState.disasterTimer <= 0) {
                    triggerDisaster();
                    gameState.disasterTimer = 10;
                }
            }

            gameState.claimsThisTurn = 0;
            gameState.attacksThisTurn = 0;

            if (gameState.players[gameState.currentPlayer].isAI) setTimeout(executeAITurn, 600);

            isProcessingTurn = false;
            renderGame();
        }

        function executeAITurn() {
            if (!gameState.players[gameState.currentPlayer].isAI) return;

            logEvent(`🤖 Processing Smart AI Turn for Player ${gameState.currentPlayer + 1}`);

            const playerIdx = gameState.currentPlayer;
            const p = gameState.players[playerIdx];

            if (p.gold > gameState.TROOP_COST * 2 && p.troops < 500) {
                gameState.players[playerIdx].gold -= gameState.TROOP_COST;
                gameState.players[playerIdx].troops += 100;
            }

            processAIDiplomacy(playerIdx);

            let attacked = false;
            for (let i = 0; i < gameState.ownership.length; i++) {
                const owner = gameState.ownership[i];
                if (owner !== -1 && owner !== playerIdx) {
                    const r = Math.floor(i / gameState.boardCols);
                    const c = i % gameState.boardCols;
                    if (isAdjacentToOwned(r, c, playerIdx) && Math.random() < 0.7) {
                        attacked = aiAttack(i, owner, playerIdx);
                        if (attacked) break;
                    }
                }
            }

            if (gameState.claimsThisTurn < gameState.maxClaimsPerTurn) {
                for (let r = 0; r < gameState.boardRows; r++) {
                    for (let c = 0; c < gameState.boardCols; c++) {
                        const idx = r * gameState.boardCols + c;
                        if (gameState.ownership[idx] === -1 && isAdjacentToOwned(r, c, playerIdx)) {
                            aiClaim(idx, playerIdx);
                            if (gameState.claimsThisTurn >= gameState.maxClaimsPerTurn) break;
                        }
                    }
                }
            }

            for (let i = 0; i < gameState.ownership.length; i++) {
                if (gameState.ownership[i] === playerIdx && !gameState.buildings[i] && p.gold > 50000) {
                    const structures = ['fort', 'town', 'mine'];
                    const structType = structures[Math.floor(Math.random() * structures.length)];
                    aiBuildStructure(i, playerIdx, structType);
                    break;
                }
            }

            endTurn();
        }

        function showTooltip(e, r, c) {
            const tooltip = document.getElementById('tooltip');
            const idx = r * gameState.boardCols + c;
            const t = localization[currentLang];

            if (gameState.fogEnabled && !isCellVisible(r, c, gameState.currentPlayer)) {
                hideTooltip();
                return;
            }

            const terrain = gameState.terrain[r][c];
            const owner = gameState.ownership[idx];
            const building = gameState.buildings[idx];
            const troops = gameState.troops[idx];
            const disaster = gameState.disasters[idx];

            let terrainName = t[terrain] || terrain.toUpperCase();
            let text = `${terrainName} (${r}, ${c})`;

            if (owner >= 0) text += `\n${t.owner}: Player ${owner + 1}`;
            if (building) text += `\n${t.building}: ${t[building] || building.toUpperCase()}`;
            if (troops > 0) text += `\n${t.troops}: ${troops.toLocaleString()}`;
            if (disaster) text += `\n${t.disaster}: ${t[disaster.type] || disaster.type.toUpperCase()}`;

            tooltip.textContent = text;
            tooltip.style.display = 'block';

            let left = e.pageX + 12;
            let top = e.pageY + 12;

            if (left + 220 > window.innerWidth) {
                left = e.pageX - 232;
            }
            if (top + 180 > window.innerHeight) {
                top = e.pageY - 192;
            }

            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

        function isCellVisible(r, c, playerIdx) {
            if (!gameState.fogEnabled) return true;
            const idx = r * gameState.boardCols + c;
            if (gameState.ownership[idx] === playerIdx) return true;
            return isAdjacentToOwned(r, c, playerIdx);
        }

        function renderGame() {
            renderPlayerCards();
            renderBoard();

            const t = localization[currentLang];
            document.getElementById('turn-info').textContent = `${t.turnLabel} ${gameState.turn} - ${t.playerTurn} ${gameState.currentPlayer + 1}'s Turn`;
            document.getElementById('disaster-countdown').textContent = `⚠️ ${t.disasterIn} ${gameState.disasterTimer} ${t.turns}`;
        }

        function renderPlayerCards() {
            const grid = document.getElementById('players-grid');
            grid.innerHTML = '';

            gameState.players.forEach((p, idx) => {
                if (p.isDefeated) return;
                const card = document.createElement('div');
                card.className = `player-card p${idx + 1}`;
                card.style.borderColor = p.color;

                card.innerHTML = `
                    <div class="player-name">
                        <span>${p.name}</span>
                        <span>${idx === gameState.currentPlayer ? '🟢 Active' : ''}</span>
                    </div>
                    <div class="player-stat"><span>Gold:</span> <span class="player-stat-value">$${p.gold.toLocaleString()}</span></div>
                    <div class="player-stat"><span>Troops:</span> <span class="player-stat-value">${p.troops.toLocaleString()}</span></div>
                    <div class="player-stat"><span>Population:</span> <span class="player-stat-value">${p.population.toLocaleString()}</span></div>
                    <div class="player-stat"><span>Happiness:</span> <span class="player-stat-value">${p.happiness}%</span></div>
                `;
                grid.appendChild(card);
            });
        }

        const TERRAIN_PROPS = {
            mountain: { glyphs: ['⛰️'], count: 1, sizeRange: [60, 60], floatRange: [28, 28] },
            hills:    { glyphs: ['🌲', '🌳'],      count: 4, sizeRange: [16, 22], floatRange: [4, 10] },
            plains:   { glyphs: ['🌾', '🌱'],      count: 4, sizeRange: [13, 18], floatRange: [2, 5] },
            desert:   { glyphs: ['🌵', '🪨'],      count: 4, sizeRange: [14, 20], floatRange: [3, 7] },
            oasis:    { glyphs: ['🌴', '🌿'],      count: 3, sizeRange: [16, 22], floatRange: [4, 8] },
            tundra:   { glyphs: ['❄️', '🪨'],      count: 4, sizeRange: [12, 16], floatRange: [2, 5] },
            ocean:    { glyphs: [], count: 0, sizeRange: [0, 0], floatRange: [0, 0] }
        };

        function tileRand(seed) {
            let x = (seed * 2654435761) >>> 0;
            return function () {
                x ^= x << 13; x >>>= 0;
                x ^= x >> 17; x >>>= 0;
                x ^= x << 5;  x >>>= 0;
                return (x % 10000) / 10000;
            };
        }

        function decorateTile(cell, terrain, r, c) {
            if (terrain === 'mountain') {
                const propEl = document.createElement('div');
                propEl.className = 'terrain-prop mountain-prop';
                propEl.textContent = TERRAIN_PROPS.mountain.glyphs[0];
                cell.appendChild(propEl);
                return;
            }

            const cfg = TERRAIN_PROPS[terrain];
            if (!cfg || cfg.count === 0) return;
            const rand = tileRand(r * 137 + c * 31 + 7);
            const [sMin, sMax] = cfg.sizeRange;
            const [fMin, fMax] = cfg.floatRange;

            for (let i = 0; i < cfg.count; i++) {
                const propEl = document.createElement('div');
                propEl.className = `terrain-prop ${terrain}-prop`;
                propEl.textContent = cfg.glyphs[Math.floor(rand() * cfg.glyphs.length)];
                const px = Math.round(15 + rand() * 70);
                const py = Math.round(15 + rand() * 70);
                const ps = Math.round(sMin + rand() * (sMax - sMin));
                const pz = Math.round(fMin + rand() * (fMax - fMin));
                propEl.style.setProperty('--px', px + '%');
                propEl.style.setProperty('--py', py + '%');
                propEl.style.setProperty('--ps', ps + 'px');
                propEl.style.setProperty('--pz', pz + 'px');
                cell.appendChild(propEl);
            }
        }

        function renderBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            board.style.gridTemplateColumns = `repeat(${gameState.boardCols}, 60px)`;
            board.style.gridTemplateRows = `repeat(${gameState.boardRows}, 60px)`;

            if (gameState.showBorders) board.classList.remove('no-borders');
            else board.classList.add('no-borders');

            for (let r = 0; r < gameState.boardRows; r++) {
                for (let c = 0; c < gameState.boardCols; c++) {
                    const idx = r * gameState.boardCols + c;
                    const cell = document.createElement('div');
                    const terrain = gameState.terrain[r][c];

                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.className = `cell ${terrain}`;

                    const faceTop = document.createElement('div');
                    faceTop.className = 'face-top';
                    cell.appendChild(faceTop);

                    const walls = ['n', 's', 'e', 'w'];
                    walls.forEach(w => {
                        const wall = document.createElement('div');
                        wall.className = `wall wall-${w}`;
                        cell.appendChild(wall);
                    });

                    const owner = gameState.ownership[idx];
                    if (owner >= 0) cell.classList.add(`owned-p${owner + 1}`);

                    if (gameState.selectedRow === r && gameState.selectedCol === c) cell.classList.add('selected');

                    if (gameState.selectedAction === 'attack') {
                        if (gameState.attackSourceIdx === idx) {
                            cell.classList.add('attack-source');
                        } else if (gameState.attackSourceIdx !== null) {
                            const sR = Math.floor(gameState.attackSourceIdx / gameState.boardCols);
                            const sC = gameState.attackSourceIdx % gameState.boardCols;
                            const adjacent = (Math.abs(sR - r) + Math.abs(sC - c)) === 1;
                            if (adjacent && owner !== -1 && owner !== gameState.currentPlayer) {
                                cell.classList.add('attack-target');
                            }
                        }
                    }

                    const visible = isCellVisible(r, c, gameState.currentPlayer);
                    if (!visible) {
                        cell.classList.add('fogged');
                        const fog = document.createElement('div');
                        fog.className = 'fog-icon';
                        fog.textContent = '🌫️';
                        cell.appendChild(fog);
                    } else {
                        if (!gameState.buildings[idx]) {
                            decorateTile(cell, terrain, r, c);
                        }

                        if (owner >= 0) {
                            const ring = document.createElement('div');
                            ring.className = 'owner-ring';
                            cell.appendChild(ring);
                        }

                        const troops = gameState.troops[idx];
                        if (troops > 0) {
                            const troopCount = document.createElement('div');
                            troopCount.className = 'troop-count';
                            troopCount.textContent = troops;
                            cell.appendChild(troopCount);
                        }

                        const building = gameState.buildings[idx];
                        if (building) {
                            const base = document.createElement('div');
                            base.className = 'building-base';
                            cell.appendChild(base);

                            const buildingProp = document.createElement('div');
                            buildingProp.className = `building-prop ${building}-prop`;
                            buildingProp.textContent = getBuildingGlyph(building);
                            cell.appendChild(buildingProp);

                            const tag = document.createElement('div');
                            tag.className = 'building-tag';
                            tag.textContent = getBuildingChar(building);
                            cell.appendChild(tag);
                        }

                        if (owner >= 0 && isCapitalTile(idx)) {
                            const marker = document.createElement('div');
                            marker.className = 'capital-marker';
                            marker.textContent = '👑';
                            cell.appendChild(marker);
                        }

                        const disaster = gameState.disasters[idx];
                        if (disaster) {
                            const overlay = document.createElement('div');
                            overlay.className = `disaster-overlay ${disaster.type}-overlay`;
                            overlay.textContent = getDisasterChar(disaster.type);
                            cell.appendChild(overlay);
                        }

                        const feature = gameState.namedFeatures.find(f => f.row === r && f.col === c);
                        if (feature) {
                            const nameEl = document.createElement('div');
                            nameEl.className = 'named-feature';
                            nameEl.textContent = feature.name;
                            cell.appendChild(nameEl);
                        }
                    }

                    cell.addEventListener('click', () => handleCellClick(r, c));
                    cell.addEventListener('mousemove', (e) => showTooltip(e, r, c));
                    cell.addEventListener('mouseleave', hideTooltip);

                    board.appendChild(cell);
                }
            }
        }
    </script>
